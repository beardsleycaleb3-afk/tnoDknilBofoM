<!DOCTYPE html><canvas id=c width=400 height=600 style="background:black"></canvas>
<script>
h="a61054895a1bf357a98b58663765592cb019012de136a6cd0af3fd67bad1bd42"
p=h.match(/.{2}/g).map(x=>parseInt(x,16)/255)
c=document.getElementById`c`;ctx=c.getContext`2d`

function frame(){
  ctx.fillStyle='black';ctx.fillRect(0,0,400,600)
  ctx.save();ctx.translate(200,300);ctx.scale(1+p[0]*2,1+p[0]*2)
  
  // Triangle outline (neon green glow)
  ctx.shadowColor='lime';ctx.shadowBlur=20;ctx.strokeStyle='lime'
  ctx.lineWidth=3;ctx.beginPath()
  ctx.moveTo(0,-120);ctx.lineTo(-90,90);ctx.lineTo(90,90);ctx.closePath()
  ctx.stroke();ctx.shadowBlur=0
  
  // Hash points orbiting INSIDE triangle
  for(let i=1;i<16;i++){
    let a=p[i]*Math.PI*2,x=Math.cos(a)*80,y=Math.sin(a)*80
    ctx.fillStyle=`hsl(${p[i+16]*360},100%,${50+p[i]*20}%)`
    ctx.beginPath();ctx.arc(x,y,6+p[i]*3,0,Math.PI*2);ctx.fill()
  }
  ctx.restore();requestAnimationFrame(frame)}
frame()
  
  }
